name: Refresh Demo

on:
  workflow_dispatch: {}                 # 手动触发

  schedule:
    - cron: "0 20 * * *"                # 每天 04:00 北京时间，等于前一天 20:00 UTC

  push:
    paths:
      - ".github/workflows/main.yml"    # 只在此 workflow 文件变动时触发

permissions:
  contents: write                       # 允许 Actions 写入仓库内容，用于提交和推送 Demo 分支

concurrency:
  group: refresh-demo                   # 避免多个刷新任务同时运行
  cancel-in-progress: true

jobs:
  refresh-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0                # 拉取完整历史，方便创建 orphan 分支和强推

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22              # 固定 Node 主版本，避免 latest 导致构建不稳定

      - name: Build project with shadcn
        shell: bash
        run: |
          set -euo pipefail

          # 删除上一次临时生成的项目
          rm -rf temp-app

          # 创建一个新的 Next.js App Router 项目
          npx --yes create-next-app@latest temp-app \
            --yes \
            --ts \
            --eslint \
            --tailwind \
            --app \
            --src-dir \
            --turbopack \
            --import-alias "@/*"

          # 初始化 shadcn/ui
          npx --yes shadcn@latest init \
            --cwd temp-app \
            -t next \
            -b slate \
            --src-dir \
            --css-variables \
            -y

          # 安装全部 shadcn/ui 组件
          npx --yes shadcn@latest add \
            --cwd temp-app \
            --all \
            -y \
            -o

          # 清空当前工作区，保留 .git 和 temp-app
          shopt -s dotglob nullglob

          for item in * .*; do
            case "$item" in
              .|..|.git|temp-app) continue ;;
              *) rm -rf "$item" ;;
            esac
          done

          # 把临时项目复制回仓库根目录
          cp -a temp-app/. .

          # 删除临时项目
          rm -rf temp-app

      - name: Install and build
        shell: bash
        run: |
          set -euo pipefail

          # 此时 create-next-app 已经生成 package-lock.json，所以 npm ci 可以正常使用
          npm ci

          # 构建失败时让 workflow 失败，不吞掉错误
          npm run build

      - name: Commit and force push demo branch
        shell: bash
        run: |
          set -euo pipefail

          # 配置 GitHub Actions 机器人身份
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 使用北京时间作为提交信息
          TIME=$(TZ=Asia/Shanghai date +"%Y-%m-%d %H:%M:%S")

          # 创建全新的孤立 Demo 分支，不保留历史记录
          git checkout --orphan Demo

          # 清除 Git 暂存区里的旧追踪文件
          git rm -rf --cached . 2>/dev/null || true

          # 添加当前全部文件
          git add -A

          # 提交并强制推送到 Demo 分支
          git commit -m "$TIME"
          git push --force origin Demo
